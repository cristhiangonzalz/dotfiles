# Configuracion para que el touchpad y scroll funcionen
# ruta de ubicacion: /usr/share/X11/xorg.conf.d 
Section "InputClass"
    Identifier "libinput touchpad"
    MatchIsTouchpad "on"
    Driver "libinput"
    Option "Tapping" "on"
    Option "TappingButtonMap" "lrm"
    Option "NaturalScrolling" "true"
    Option "ScrollMethod" "twofinger"
EndSection
